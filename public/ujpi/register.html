<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xアカウント登録 - JAPAN POKER INDEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0f1923; color: #e8edf2;
  min-height: 100vh; line-height: 1.7;
}
.site-header {
  position: sticky; top: 0; z-index: 20;
  background: #0f1923; border-bottom: 1px solid #1e2f44;
  padding: 0 24px;
}
.site-header-inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px;
  padding: 12px 0;
}
.site-logo { height: 120px; width: auto; display: block; }
.header-ad {
  flex: 1; max-width: 600px; height: 80px;
  background: #162030; border: 1px dashed #2a3f5f; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #3a5068; font-size: 0.7em; font-weight: 600; letter-spacing: 0.2em;
}
@media (max-width: 768px) { .header-ad { display: none; } }
.page-hero {
  max-width: 960px; margin: 0 auto;
  padding: 72px 24px 56px;
  border-bottom: 1px solid #1e2f44;
}
.page-hero-label {
  font-size: 0.72em; font-weight: 600; color: #d4a017;
  letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px;
}
.page-hero-title {
  font-size: 2.4em; font-weight: 700;
  line-height: 1.25; margin-bottom: 20px;
}
.page-hero-sub {
  font-size: 1.05em; color: #c0cad6;
  font-weight: 300; letter-spacing: 0.04em;
}
.page-body { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }
.form-description {
  font-size: 0.92em; color: #c0cad6; line-height: 1.85;
  margin-bottom: 40px;
}
.form-group { margin-bottom: 28px; }
.form-label {
  display: block; font-size: 0.85em; font-weight: 600;
  color: #c0cad6; margin-bottom: 8px; letter-spacing: 0.04em;
}
.form-label .required {
  color: #d4a017; font-size: 0.85em; margin-left: 6px;
}
.form-input, .form-textarea {
  width: 100%; padding: 14px 16px;
  background: #162030; border: 1px solid #2a3f5f; border-radius: 8px;
  color: #e8edf2; font-family: inherit; font-size: 0.95em;
  transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus {
  outline: none; border-color: #d4a017;
}
.form-input::placeholder, .form-textarea::placeholder { color: #4a5a6a; }
.form-textarea { min-height: 100px; resize: vertical; }
.form-hint {
  font-size: 0.78em; color: #7f9aad; margin-top: 6px; line-height: 1.6;
}
.form-checkbox-group {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  background: #162030; border: 1px solid #2a3f5f; border-radius: 8px;
}
.form-checkbox-group input[type="checkbox"] {
  width: 20px; height: 20px; accent-color: #d4a017;
  flex-shrink: 0; cursor: pointer;
}
.form-checkbox-label {
  font-size: 0.9em; color: #e8edf2; cursor: pointer; line-height: 1.5;
}
.form-checkbox-label small {
  display: block; font-size: 0.82em; color: #7f9aad; margin-top: 2px;
}
.submit-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 16px 40px; margin-top: 12px;
  background: #d4a017; color: #0f1923;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 1em; font-weight: 700;
  letter-spacing: 0.06em; cursor: pointer;
  transition: background 0.15s;
}
.submit-btn:hover { background: #e0b030; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.submit-btn .x-icon { width: 16px; height: 16px; fill: #0f1923; }
.result-message {
  margin-top: 32px; padding: 22px 24px;
  border-radius: 8px; font-size: 0.92em; line-height: 1.8;
  display: none;
}
.result-message.success {
  background: linear-gradient(135deg, #162030 0%, #1a2a3a 100%);
  border: 1px solid #2a3f5f; border-left: 3px solid #d4a017;
  color: #c0cad6;
}
.result-message.error {
  background: linear-gradient(135deg, #201616 0%, #2a1a1a 100%);
  border: 1px solid #5f2a2a; border-left: 3px solid #d04040;
  color: #e0b0b0;
}
/* ── Light mode ── */
html[data-theme="light"] body { background: #f4f6f9; color: #1a2332; }
html[data-theme="light"] .site-header { background: #f4f6f9; border-bottom-color: #d0d8e4; }
html[data-theme="light"] .page-hero { border-bottom-color: #d0d8e4; }
html[data-theme="light"] .page-hero-sub { color: #5a6a7a; }
html[data-theme="light"] .form-description { color: #3a4a5a; }
html[data-theme="light"] .form-label { color: #3a4a5a; }
html[data-theme="light"] .form-input,
html[data-theme="light"] .form-textarea {
  background: #e8ecf2; border-color: #c8d0dc; color: #1a2332;
}
html[data-theme="light"] .form-input::placeholder,
html[data-theme="light"] .form-textarea::placeholder { color: #8a9aaa; }
html[data-theme="light"] .form-hint { color: #5a6a7a; }
html[data-theme="light"] .form-checkbox-group { background: #e8ecf2; border-color: #c8d0dc; }
html[data-theme="light"] .form-checkbox-label { color: #1a2332; }
html[data-theme="light"] .form-checkbox-label small { color: #5a6a7a; }
html[data-theme="light"] .result-message.success { background: #e8ecf2; border-color: #c8d0dc; color: #3a4a5a; border-left-color: #d4a017; }
html[data-theme="light"] .result-message.error { background: #f9e8e8; border-color: #dcc8c8; color: #5a3a3a; border-left-color: #d04040; }
html[data-theme="light"] .theme-toggle { color: #1a2332; border-color: #c8d0dc; }
html[data-theme="light"] .theme-toggle:hover { border-color: #5a6a7a; }
.theme-toggle {
  margin-left: auto; padding: 6px 14px;
  background: transparent; color: #e8edf2;
  border: 1px solid #2a3f5f; border-radius: 4px;
  font-family: inherit; font-size: 0.75em; font-weight: 600;
  letter-spacing: 0.12em; cursor: pointer; flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.theme-toggle:hover { border-color: #7f9aad; }
@media (max-width: 640px) {
  .page-hero { padding: 48px 16px 40px; }
  .page-hero-title { font-size: 1.7em; }
  .page-body { padding: 40px 16px 60px; }
  .submit-btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a href="/ujpi/"><img src="/ujpi/JPI_logo_ver1.PNG" alt="JAPAN POKER INDEX" class="site-logo"></a>
    <div class="header-ad">AD</div>
  </div>
</header>
<div class="page-hero">
  <div class="page-hero-label">Registration</div>
  <h1 class="page-hero-title">Xアカウント登録</h1>
  <p class="page-hero-sub">ランキングにあなたのXアカウントを連携できます。</p>
</div>
<div class="page-body">
  <p class="form-description">
    JPIランキングにXアカウントを登録すると、あなたの名前の横にXアイコンが表示されます。<br>
    登録は無料です。以下のフォームから申請してください。
  </p>
  <form id="registerForm">
    <div class="form-group">
      <label class="form-label" for="ranking_name">ランキング上の名前<span class="required">*必須</span></label>
      <input class="form-input" type="text" id="ranking_name" name="ranking_name" required
             placeholder="ランキングに表示されている名前を入力">
      <p class="form-hint">ランキングページで表示されている名前を正確に入力してください。</p>
    </div>
    <div class="form-group">
      <label class="form-label" for="x_account">Xアカウント<span class="required">*必須</span></label>
      <input class="form-input" type="text" id="x_account" name="x_account" required
             placeholder="@username">
      <p class="form-hint">@を含めて入力してください（例: @poker_taro）</p>
    </div>
    <div class="form-group">
      <label class="form-label">写真掲載について</label>
      <div class="form-checkbox-group">
        <input type="checkbox" id="photo_permission" name="photo_permission" checked>
        <label class="form-checkbox-label" for="photo_permission">
          写真の掲載を許可する
          <small>許可いただくと、ランキングや個人ページにトーナメント時の写真(flicker)が表示されます。</small>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="current_points">現在のポイント<span class="required">*必須</span></label>
      <input class="form-input" type="text" id="current_points" name="current_points" required
             placeholder="例: 64.0461">
      <p class="form-hint">ランキングページに表示されているポイントを入力してください。本人確認に使用します。</p>
    </div>
    <div class="form-group">
      <label class="form-label" for="notes">備考・要望</label>
      <textarea class="form-textarea" id="notes" name="notes"
                placeholder="名前の表記修正やその他ご要望があれば（任意）"></textarea>
    </div>
    <button class="submit-btn" type="submit">
      <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      登録を申請する
    </button>
  </form>
  <div id="resultMessage" class="result-message"></div>
</div>
<script>
// === GAS Web App URL（デプロイ後に差し替えてください） ===
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbxWGJ3xh-RO52UABqFyHumcERDOxg5PZANOPiKj9UWoHTnp1L7SrkKZRenmEp9hyhUoCw/exec";

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const btn = this.querySelector(".submit-btn");
  const msg = document.getElementById("resultMessage");
  msg.style.display = "none";

  // Xアカウントの正規化（@がなければ付加）
  const xInput = document.getElementById("x_account");
  let xVal = xInput.value.trim();
  if (xVal && !xVal.startsWith("@")) xVal = "@" + xVal;
  xInput.value = xVal;

  // バリデーション
  if (!/^@[a-zA-Z0-9_]{1,15}$/.test(xVal)) {
    msg.className = "result-message error";
    msg.textContent = "Xアカウントの形式が正しくありません。@に続けて英数字・アンダースコアで入力してください。";
    msg.style.display = "block";
    return;
  }

  const data = {
    ranking_name: document.getElementById("ranking_name").value.trim(),
    x_account: xVal,
    photo_permission: document.getElementById("photo_permission").checked,
    current_points: document.getElementById("current_points").value.trim(),
    notes: document.getElementById("notes").value.trim()
  };

  btn.disabled = true;
  btn.textContent = "送信中...";

  try {
    await fetch(GAS_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    // no-cors のためレスポンス内容は読めないが、送信自体は成功
    this.style.display = "none";
    msg.className = "result-message success";
    msg.innerHTML = "登録申請を受け付けました。確認後、ランキングに反映いたします。<br>ありがとうございました！";
    msg.style.display = "block";
  } catch (err) {
    msg.className = "result-message error";
    msg.textContent = "送信に失敗しました。時間をおいて再度お試しください。";
    msg.style.display = "block";
    btn.disabled = false;
    btn.textContent = "登録を申請する";
  }
});
</script>
</body>
</html>
